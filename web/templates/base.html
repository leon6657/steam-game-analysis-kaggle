 <!DOCTYPE html>
 <html lang="zh-CN">
 <head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Steam 游戏大数据分析平台</title>
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
     <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
     <link rel="stylesheet" href="/static/css/style.css">
 </head>
 <body>
     <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
         <div class="container-fluid">
             <a class="navbar-brand" href="/">
                 <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="me-2">
                     <path d="M12 2L2 7l10 5 10-5-10-5z"></path>
                     <path d="M2 17l10 5 10-5"></path>
                     <path d="M2 12l10 5 10-5"></path>
                 </svg>
                 Steam 大数据分析
             </a>
             <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                 <span class="navbar-toggler-icon"></span>
             </button>
             <div class="collapse navbar-collapse" id="navbarNav">
                 <ul class="navbar-nav ms-auto">
                     <li class="nav-item"><a class="nav-link" href="/" data-page="index">总览</a></li>
                     <li class="nav-item"><a class="nav-link" href="/games" data-page="games">游戏探索</a></li>
                     <li class="nav-item"><a class="nav-link" href="/genres" data-page="genres">类型分析</a></li>
                     <li class="nav-item"><a class="nav-link" href="/developers" data-page="developers">开发商</a></li>
                     <li class="nav-item"><a class="nav-link" href="/price" data-page="price">价格分析</a></li>
                 </ul>
             </div>
         </div>
     </nav>
 
     <main class="container-fluid py-4">
         {% block content %}{% endblock %}
     </main>
 
     <footer class="footer mt-auto py-3 bg-light border-top">
         <div class="container text-center text-muted small">
             大数据分析与应用 课程项目 &mdash; Steam 游戏大数据分析平台
         </div>
     </footer>
 
     <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
     <script>
         // 高亮当前页导航
         document.querySelectorAll('.nav-link').forEach(function(el) {
             var page = el.getAttribute('data-page');
             if (page && window.location.pathname.indexOf(page) > -1) {
                 el.classList.add('active');
             }
             if (window.location.pathname === '/' && page === 'index') {
                 el.classList.add('active');
             }
         });
 
         // 渲染 Plotly 图表辅助函数
         function renderChart(elementId, chartData) {
             if (!chartData || Object.keys(chartData).length === 0) return;
             var el = document.getElementById(elementId);
             if (el) Plotly.newPlot(elementId, chartData.data, chartData.layout, {responsive: true});
         }
 
         function showLoading(id) {
             var el = document.getElementById(id);
             if (el) el.innerHTML = '<div class="text-center py-5"><div class="spinner-border text-primary" role="status"><span class="visually-hidden">加载中...</span></div></div>';
         }
     </script>
     {% block scripts %}{% endblock %}
 </body>
 </html>
